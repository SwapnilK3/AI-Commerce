version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://commerce:commerce123@postgres:5432/commerce_db
      - REDIS_URL=redis://redis:6379/0
      - WHATSAPP_WEB_SERVICE_URL=http://whatsapp:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce123
      POSTGRES_DB: commerce_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U commerce -d commerce_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # ── WhatsApp Web Service ─────────────────────────
  whatsapp:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - wa_session:/app/session_data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  wa_session:

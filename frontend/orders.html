<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — AI Smart Commerce</title>
    <meta name="description" content="View and manage all commerce orders">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fas fa-satellite-dish mr-2"></i>AI Commerce</h1>
            <p>Smart Communication Platform</p>
        </div>
        <nav class="mt-6">
            <a href="/" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="/orders" class="nav-item"><i class="fas fa-shopping-bag"></i> Orders</a>
            <a href="/events" class="nav-item"><i class="fas fa-bolt"></i> Events</a>
            <a href="/communications" class="nav-item"><i class="fas fa-comments"></i> Communications</a>
            <a href="/simulate" class="nav-item"><i class="fas fa-play-circle"></i> Simulate</a>
            <a href="/settings" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-700/50">
            <div class="flex items-center gap-2 text-xs text-slate-500">
                <div class="pulse-dot bg-green-500"></div>
                <span>System Online</span>
            </div>
        </div>
    </aside>

    <button id="sidebar-toggle" class="fixed top-4 left-4 z-50 lg:hidden btn btn-outline p-2">
        <i class="fas fa-bars"></i>
    </button>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="fas fa-shopping-bag mr-2 text-indigo-400"></i>Orders</h2>
            <p>View and track all incoming orders from connected platforms</p>
        </div>

        <!-- Filters -->
        <div class="glass-card p-5 mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" id="search-input" class="form-input" placeholder="Search by name or order ID...">
                </div>
                <div>
                    <select id="status-filter" class="form-input form-select">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="delivered">Delivered</option>
                        <option value="delivery_failed">Delivery Failed</option>
                        <option value="payment_pending">Payment Pending</option>
                        <option value="returned">Returned</option>
                    </select>
                </div>
                <div>
                    <select id="platform-filter" class="form-input form-select">
                        <option value="">All Platforms</option>
                        <option value="shopify">Shopify</option>
                        <option value="woocommerce">WooCommerce</option>
                    </select>
                </div>
                <span id="orders-count" class="text-sm text-slate-400">0 orders</span>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="glass-card p-6">
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Phone</th>
                            <th>Platform</th>
                            <th>Status</th>
                            <th>Items</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body">
                        <tr>
                            <td colspan="7">
                                <div class="loading-overlay">
                                    <div class="spinner"></div><span>Loading orders...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/orders.js"></script>
</body>

</html>
